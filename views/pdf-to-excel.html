<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Google Search Console -->
  <meta name="google-site-verification" content="IMEdksyoTLeublqj-FCTNQTd-A0FIBdwwwuo3R9Vi2E" />
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3048294368970958" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF转Excel - 免费在线PDF转Excel工具</title>
  <meta name="description" content="免费在线PDF转Excel工具，将PDF表格转换为可编辑的Excel文件。">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">PDF工具矩阵</a>
      <ul class="nav-links">
        <li><a href="/merge">PDF合并</a></li>
        <li><a href="/compress">PDF压缩</a></li>
        <li><a href="/convert">PDF转换</a></li>
      </ul>
    </div>
  </nav>

  <main class="tool-page">
    <div class="container">
      <div class="tool-header">
        <h1>📊 PDF转Excel</h1>
        <p>将PDF中的表格数据转换为可编辑的Excel文件</p>
      </div>

      <div class="upload-area" id="dropZone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">拖拽PDF文件到这里，或点击选择文件</div>
        <div class="upload-hint">支持单个PDF文件，最大100MB</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf">
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%; height: 20px; background: linear-gradient(90deg, #059669, #10b981); border-radius: 10px; transition: width 0.3s ease;"></div>
        </div>
        <div class="progress-text" id="progressText">转换中...</div>
      </div>

      <button class="process-btn" id="convertBtn" disabled>📊 转换为Excel</button>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 PDF工具矩阵</p></div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    const uploader = new FileUploader({
      dropZone: document.getElementById('dropZone'),
      fileInput: document.getElementById('fileInput'),
      fileList: document.getElementById('fileList'),
      maxFiles: 1,
      allowedTypes: ['application/pdf']
    });

    const convertBtn = document.getElementById('convertBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    const origAdd = uploader.addFiles.bind(uploader);
    uploader.addFiles = function(files) { origAdd(files); updateUI(); };
    const origRemove = uploader.removeFile.bind(uploader);
    uploader.removeFile = function(index) { origRemove(index); updateUI(); };

    function updateUI() {
      convertBtn.disabled = uploader.getFiles().length === 0;
    }

    convertBtn.addEventListener('click', async () => {
      const files = uploader.getFiles();
      if (!files.length) return;

      progressContainer.style.display = 'block';
      utils.showLoading(convertBtn);

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) { clearInterval(interval); progress = 90; }
        progressFill.style.width = progress + '%';
        progressText.textContent = '转换中... ' + Math.round(progress) + '%';
      }, 200);

      const fd = new FormData();
      fd.append('file', files[0]);

      try {
        const r = await fetch('/api/pdf/pdf-to-excel', { method: 'POST', body: fd });
        clearInterval(interval);
        if (!r.ok) { const errData = await r.json().catch(() => ({})); throw new Error(errData.error || '转换失败'); }

        progressFill.style.width = '100%';
        progressText.textContent = '转换完成！';

        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'converted.xlsx';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        utils.showMessage('转换成功！', 'success');
      } catch(e) {
        utils.showMessage('转换失败: ' + e.message, 'error');
      } finally {
        utils.hideLoading(convertBtn);
        setTimeout(() => { progressContainer.style.display = 'none'; progressFill.style.width = '0%'; }, 2000);
      }
    });

    updateUI();
  </script>
</body>
</html>
