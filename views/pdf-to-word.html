<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF转Word - 免费在线PDF工具</title>
  <meta name="description" content="免费在线PDF转Word工具，将PDF文件转换为可编辑的Word文档。">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">PDF工具矩阵</a>
      <ul class="nav-links">
        <li><a href="/merge">PDF合并</a></li>
        <li><a href="/compress">PDF压缩</a></li>
        <li><a href="/convert">PDF转换</a></li>
      </ul>
    </div>
  </nav>

  <main class="tool-page">
    <div class="container">
      <div class="tool-header">
        <h1>📝 PDF转Word</h1>
        <p>将PDF文件转换为可编辑的Word文档</p>
      </div>

      <div class="upload-area" id="dropZone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">拖拽PDF文件到这里，或点击选择文件</div>
        <div class="upload-hint">支持单个PDF文件，最大100MB</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf">
      </div>

      <div class="file-list" id="fileList"></div>

      <!-- 转换模式选择 -->
      <div id="modeOptions" style="display: none; background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <h3 style="margin-bottom: 15px; color: #1f2937;">转换模式</h3>
        <div style="display: flex; gap: 15px;">
          <label style="flex: 1; display: flex; align-items: center; gap: 12px; padding: 15px; background: #f9fafb; border-radius: 8px; cursor: pointer; border: 2px solid #4f46e5;">
            <input type="radio" name="mode" value="editable" checked style="width: 20px; height: 20px;">
            <div>
              <div style="font-weight: 600; margin-bottom: 4px;">✏️ 可编辑模式</div>
              <div style="font-size: 0.85rem; color: #6b7280;">保留文字和格式，可以编辑修改</div>
            </div>
          </label>
          <label style="flex: 1; display: flex; align-items: center; gap: 12px; padding: 15px; background: #f9fafb; border-radius: 8px; cursor: pointer; border: 2px solid #e5e7eb;">
            <input type="radio" name="mode" value="layout" style="width: 20px; height: 20px;">
            <div>
              <div style="font-weight: 600; margin-bottom: 4px;">📄 排版模式</div>
              <div style="font-size: 0.85rem; color: #6b7280;">完美还原排版，文字不可编辑</div>
            </div>
          </label>
        </div>
      </div>

      <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%; height: 20px; background: linear-gradient(90deg, #2563eb, #3b82f6); border-radius: 10px; transition: width 0.3s ease;"></div>
        </div>
        <div class="progress-text" id="progressText">转换中...</div>
      </div>

      <button class="process-btn" id="convertBtn" disabled>📝 转换为Word</button>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2024 PDF工具矩阵</p></div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    const uploader = new FileUploader({
      dropZone: document.getElementById('dropZone'),
      fileInput: document.getElementById('fileInput'),
      fileList: document.getElementById('fileList'),
      maxFiles: 1,
      allowedTypes: ['application/pdf']
    });

    const convertBtn = document.getElementById('convertBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    const origAdd = uploader.addFiles.bind(uploader);
    uploader.addFiles = function(files) { origAdd(files); updateUI(); };
    const origRemove = uploader.removeFile.bind(uploader);
    uploader.removeFile = function(index) { origRemove(index); updateUI(); };

    // 模式切换样式
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('input[name="mode"]').forEach(r => {
          r.parentElement.style.borderColor = r.checked ? '#4f46e5' : '#e5e7eb';
        });
      });
    });

    function updateUI() {
      const hasFiles = uploader.getFiles().length > 0;
      convertBtn.disabled = !hasFiles;
      document.getElementById('modeOptions').style.display = hasFiles ? 'block' : 'none';
    }

    convertBtn.addEventListener('click', async () => {
      const files = uploader.getFiles();
      if (!files.length) return;

      const mode = document.querySelector('input[name="mode"]:checked').value;

      progressContainer.style.display = 'block';
      utils.showLoading(convertBtn);

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) { clearInterval(interval); progress = 90; }
        progressFill.style.width = progress + '%';
        progressText.textContent = '转换中... ' + Math.round(progress) + '%';
      }, 200);

      const fd = new FormData();
      fd.append('file', files[0]);
      fd.append('mode', mode);

      try {
        const r = await fetch('/api/pdf/pdf-to-word', { method: 'POST', body: fd });
        clearInterval(interval);
        if (!r.ok) { const errData = await r.json().catch(() => ({})); throw new Error(errData.error || '转换失败'); }

        progressFill.style.width = '100%';
        progressText.textContent = '转换完成！';

        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = mode === 'layout' ? 'converted_layout.docx' : 'converted.docx';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        utils.showMessage('转换成功！', 'success');
      } catch(e) {
        utils.showMessage('转换失败: ' + e.message, 'error');
      } finally {
        utils.hideLoading(convertBtn);
        setTimeout(() => { progressContainer.style.display = 'none'; progressFill.style.width = '0%'; }, 2000);
      }
    });

    updateUI();
  </script>
</body>
</html>
