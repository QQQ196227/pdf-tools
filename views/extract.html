<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF提取页面 - 免费在线PDF工具</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">PDF工具矩阵</a>
      <ul class="nav-links">
        <li><a href="/merge">PDF合并</a></li>
        <li><a href="/compress">PDF压缩</a></li>
        <li><a href="/convert">PDF转换</a></li>
      </ul>
    </div>
  </nav>

  <main class="tool-page">
    <div class="container">
      <div class="tool-header">
        <h1>✂️ 提取PDF页面</h1>
        <p>从PDF文件中提取指定页面，生成新的PDF文件</p>
      </div>

      <div class="upload-area" id="dropZone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">拖拽PDF文件到这里，或点击选择文件</div>
        <div class="upload-hint">支持单个PDF文件，最大100MB</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf">
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="file-count" id="fileCount"></div>

      <div id="pageSelector" style="display: none; background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <h3>选择要提取的页面</h3>
        <p style="color: #6b7280; margin-bottom: 15px;">输入页码，用逗号分隔（如：1,3,5-7）</p>
        <input type="text" id="pageRange" placeholder="例: 1,3,5-7" style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
      </div>

      <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%; height: 20px; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 10px; transition: width 0.3s ease;"></div>
        </div>
        <div class="progress-text" id="progressText">提取中...</div>
      </div>

      <button class="process-btn" id="extractBtn" disabled>✂️ 提取页面</button>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2024 PDF工具矩阵</p></div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    const uploader = new FileUploader({
      dropZone: document.getElementById('dropZone'),
      fileInput: document.getElementById('fileInput'),
      fileList: document.getElementById('fileList'),
      maxFiles: 1,
      allowedTypes: ['application/pdf']
    });

    const extractBtn = document.getElementById('extractBtn');
    const pageSelector = document.getElementById('pageSelector');

    const origAdd = uploader.addFiles.bind(uploader);
    uploader.addFiles = function(files) { origAdd(files); updateUI(); };
    const origRemove = uploader.removeFile.bind(uploader);
    uploader.removeFile = function(index) { origRemove(index); updateUI(); };

    function updateUI() {
      const has = uploader.getFiles().length > 0;
      extractBtn.disabled = !has;
      pageSelector.style.display = has ? 'block' : 'none';
    }

    extractBtn.addEventListener('click', async () => {
      const files = uploader.getFiles();
      if (!files.length) return;
      const pages = document.getElementById('pageRange').value.trim();
      if (!pages) return utils.showMessage('请输入要提取的页码', 'error');

      utils.showLoading(extractBtn);

      const fd = new FormData();
      fd.append('file', files[0]);
      fd.append('pages', pages);

      try {
        const r = await fetch('/api/pdf/extract', { method: 'POST', body: fd });
        if (!r.ok) { const errData = await r.json().catch(() => ({})); throw new Error(errData.error || '提取失败'); }
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'extracted.pdf';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        utils.showMessage('提取成功！', 'success');
      } catch(e) {
        utils.showMessage('提取失败: ' + e.message, 'error');
      } finally {
        utils.hideLoading(extractBtn);
      }
    });

    updateUI();
  </script>
</body>
</html>
